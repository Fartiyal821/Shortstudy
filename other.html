<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other Services | Short Study</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="other.css">
    <link rel="icon" type="image/png" href="h.png">
    <script>
        // Night mode - Load immediately before page renders to prevent flash
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
    </script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><span class="logo-icon">&lt;/&gt;</span> Short<span>Study</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="web.html">Courses</a></li>
                <li><a href="affiliate.html">Affiliate Marketing</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="other.html">Others</a></li>
            </ul>
            <div class="burger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </div>
    </nav>

    <button class="theme-toggle floating" id="themeToggle" title="Toggle Night Mode">
        <span class="theme-icon">🌙</span>
    </button>

    <section class="other">
        <div class="other-intro">
            <h1>Others</h1>
            <p>Choose the resource you need next: Notes. This section now focuses on study notes only.</p>
        </div>

        <div class="cards-grid">
            <div class="card">
                <h2>Notes</h2>
                <p>Browse uploaded course notes, PDFs, and embedded content organized by course.</p>
                <a href="notes.html" class="btn-primary">Open Notes</a>
            </div>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-init.js"></script>
    <script src="script.js"></script>
    <script>
        // Night mode functionality
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        
        // Get current theme (already set in head)
        const currentTheme = localStorage.getItem('theme') || 'light';
        updateThemeButton(currentTheme);
        
        themeToggle.addEventListener('click', () => {
            const theme = htmlElement.getAttribute('data-theme');
            const newTheme = theme === 'light' ? 'dark' : 'light';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        });
        
        function updateThemeButton(theme) {
            const icon = themeToggle.querySelector('.theme-icon');
            icon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
    </script>
</body>
</html>
