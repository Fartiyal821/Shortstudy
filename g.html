<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | Short Study</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="web.css">
    <link rel="icon" type="image/png" href="h.png">
    <script>
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
    </script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><span class="logo-icon">&lt;/&gt;</span> Short<span>Study</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="web.html">Courses</a></li>
                <li><a href="affiliate.html">Affiliate Marketing</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="other.html">Others</a></li>
            </ul>
            <div class="burger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </div>
    </nav>

    <button class="theme-toggle floating" id="themeToggle" title="Toggle Night Mode">
        <span class="theme-icon">🌙</span>
    </button>

    <section class="courses-page">
        <div class="courses-header">
            <h1>Courses</h1>
            <p>Browse all available courses and choose the best learning path for you.</p>
        </div>

        <div class="courses-container" id="coursesContainer">
            <!-- Courses loaded dynamically from storage -->
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-init.js"></script>
    <script src="db-config.js"></script>
    <script src="script.js"></script>
    <script src="web.js"></script>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        const currentTheme = localStorage.getItem('theme') || 'light';
        updateThemeButton(currentTheme);

        themeToggle.addEventListener('click', () => {
            const theme = htmlElement.getAttribute('data-theme');
            const newTheme = theme === 'light' ? 'dark' : 'light';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        });

        function updateThemeButton(theme) {
            const icon = themeToggle.querySelector('.theme-icon');
            icon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
    </script>
</body>
</html>
